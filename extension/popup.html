<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CellNames</title>
<style>
  :root { --ckb: #00cc9a; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; color: #e8eaf0; font: 14px/1.5 system-ui, sans-serif;
    width: 260px; padding: 1rem; }
  h1 { font-size: 1rem; color: var(--ckb); margin-bottom: .25rem; }
  p  { color: #888; font-size: .8rem; margin-bottom: .75rem; }
  .tip { background: #1a1d27; border-radius: 6px; padding: .6rem .8rem;
    font-size: .78rem; color: #aaa; line-height: 1.4; }
  .tip code { color: var(--ckb); font-family: monospace; }
  a { color: var(--ckb); text-decoration: none; }
</style>
</head>
<body>
  <h1>CellNames</h1>
  <p>Decentralised .ckb domain resolution on Nervos CKB</p>
  <div class="tip">
    Navigate to any <code>.ckb</code> domain:<br>
    <code>http://wyltekindustries.ckb</code>
  </div>
</body>
</html>
