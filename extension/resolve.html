<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Resolving…</title>
<style>
  :root { --ckb: #00cc9a; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; color: #e8eaf0; font: 15px/1.5 system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { text-align: center; max-width: 380px; padding: 2rem; }
  .domain { font-size: 1.4rem; font-weight: 600; color: var(--ckb); margin-bottom: .5rem; }
  .status { color: #888; font-size: .9rem; margin-bottom: 1.5rem; }
  .spinner { width: 36px; height: 36px; border: 3px solid #333;
    border-top-color: var(--ckb); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 1.5rem; }
  .error { color: #ff6b6b; font-size: .9rem; margin-top: 1rem; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="spinner"></div>
  <div class="domain" id="domain"></div>
  <div class="status" id="status">Resolving on Nervos CKB…</div>
  <div class="error" id="error"></div>
</div>
<script src="dist/resolve.js"></script>
</body>
</html>
